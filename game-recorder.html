<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Partií - Šachový oddíl TJ Bižuterie Jablonec</title>
    <meta name="description"
        content="Editor šachových partií. Nahrávejte a analyzujte své partie s diagramy a anotacemi.">
    <meta property="og:title" content="Editor Partií - Šachový oddíl TJ Bižuterie Jablonec">
    <meta property="og:description" content="Editor šachových partií s diagramy a anotacemi.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sachyjablonec.cz/game-recorder.html">
    <meta property="og:image" content="https://sachyjablonec.cz/images/og-default.png">
    <meta name="twitter:card" content="summary_large_image">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Using same CSS as rest of site -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/game-viewer2.css">
    <!-- Chess Libraries -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <!-- HTML2Canvas for export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="js/diagram-editor.js" defer></script>

    <style>
        /* Fix for dragged pieces behind modal */
        #diagramEditorModal .piece-417db,
        body>.piece-417db {
            z-index: 12000 !important;
        }

        /* Diagram Editor Styles */
        #diagramEditorModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 11000;
            justify-content: center;
            align-items: center;
        }

        #diagramEditorModal.active {
            display: flex;
        }

        .editor-content {
            background: var(--surface-color);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--primary-color);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Piece Palette */
        .palette-piece {
            width: 32px;
            height: 32px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            padding: 2px;
            transition: all 0.2s;
            background: transparent;
        }

        .palette-piece:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.15);
        }

        .palette-piece.active {
            background: rgba(212, 175, 55, 0.25);
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        /* Diagram Editor Tabs */
        .diagram-tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid rgba(255, 255, 255, 0.08);
        }

        .diagram-tab {
            flex: 1;
            padding: 0.5rem 1rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .diagram-tab:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.04);
        }

        .diagram-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .diagram-tab-content {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .diagram-tab-content:not(.active) {
            display: none;
        }

        /* Castling Checkboxes */
        .castling-check {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .castling-check input[type="checkbox"] {
            accent-color: var(--primary-color);
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        .castling-check:has(input:checked) {
            color: var(--text-primary);
        }

        .editor-toolbar {
            display: flex;
            gap: 0.25rem;
            /* Reduced from 0.5rem to fit 480px */
            flex-wrap: wrap;
            /* Force single line */
            justify-content: center;
            /* Keep centered but constrained */
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem;
            border-radius: 8px;
            width: 480px;
            /* Match board width */
            max-width: 100%;
            margin-bottom: 0.5rem;
            box-sizing: border-box;
            align-items: center;
        }

        /* Mobile Adjust */
        @media (max-width: 600px) {
            .editor-toolbar {
                width: 85vw;
                /* Match mobile board width */
            }
        }

        .tool-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .tool-btn.active {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        #diagramBoardWrapper {
            position: relative;
            width: 480px;
            height: 480px;
            touch-action: none;
        }

        #diagramBoardWrapper * {
            touch-action: none;
        }

        /* Mobile adjust */
        @media (max-width: 600px) {
            #diagramBoardWrapper {
                width: 85vw;
                height: 85vw;
            }
        }

        /* --- Restored Layout CSS --- */
        body {
            background-color: var(--background-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 1.5rem;
            margin-top: 0.5rem;
            align-items: start;
        }

        /* Medium screens */
        @media (max-width: 1100px) {
            .editor-container {
                grid-template-columns: 1fr 300px;
                gap: 1rem;
            }
        }

        /* Mobile Responsive Adjustments */
        @media (max-width: 900px) {
            .editor-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                order: 2;
            }
        }

        #board {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            overflow: hidden;
            touch-action: none;
        }

        #board * {
            touch-action: none;
        }

        .sidebar {
            background: var(--surface-color);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.2rem;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            min-height: 550px;
            height: auto;
            max-height: 85vh;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .move-list {
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem;
            border-radius: 8px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .move-pair {
            display: flex;
            align-items: center;
            width: auto;
            min-width: 90px;
            padding: 0.2rem 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .move-pair:nth-child(even) {
            background: rgba(255, 255, 255, 0.03);
        }

        .move-number {
            color: var(--text-muted);
            width: 25px;
            display: inline-block;
            font-size: 0.9em;
        }

        .move {
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-color);
            transition: background 0.2s, color 0.2s;
            margin-right: 2px;
        }

        .move:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .move.active {
            background: var(--primary-color);
            color: var(--background-color);
            font-weight: bold;
        }

        .move.future {
            opacity: 0.4;
        }

        .move-comment {
            display: block;
            font-style: italic;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.55);
            padding: 0.2rem 0.4rem 0.2rem 0.6rem;
            margin: 0.15rem 0 0.3rem 0;
            border-left: 2px solid rgba(212, 175, 55, 0.4);
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1.3;
            word-break: break-word;
        }

        .move-comment:hover {
            color: rgba(255, 255, 255, 0.85);
            border-left-color: var(--primary-color);
            background: rgba(212, 175, 55, 0.06);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .btn-control {
            background: var(--surface-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-control:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-2px);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 6px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(0, 0, 0, 0.5);
        }

        .main-btn {
            background: linear-gradient(135deg, var(--primary-color), #b8941f);
            color: #000;
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }

        .main-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
        }

        .main-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Custom scrollbar for move list */
        .move-list::-webkit-scrollbar {
            width: 6px;
        }

        .move-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .move-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        /* Variation styles */
        .variation-line {
            margin: 2px 0 2px 8px;
            padding: 3px 6px;
            border-left: 2px solid rgba(212, 175, 55, 0.4);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0 4px 4px 0;
            font-size: 0.88em;
        }

        .variation-line .variation-line {
            border-left-color: rgba(96, 165, 250, 0.4);
        }

        .variation-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1px;
        }

        .variation-actions {
            display: flex;
            gap: 2px;
        }

        .var-btn {
            cursor: pointer;
            padding: 0 4px;
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.4);
            border-radius: 3px;
            transition: all 0.15s;
            line-height: 1.4;
        }

        .var-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .var-btn-delete:hover {
            color: #f87171;
            background: rgba(248, 113, 113, 0.15);
        }

        /* Variation Modal */
        #variationModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        #variationModal.active {
            display: flex;
        }

        /* Chess Board Highlights & Hints */
        .highlight-selected {
            box-shadow: inset 0 0 3px 3px yellow;
        }

        .highlight-move {
            box-shadow: inset 0 0 3px 3px rgba(255, 255, 0, 0.8) !important;
        }

        .hint-dot {
            width: 25%;
            height: 25%;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Hide mobile-only elements on desktop by default */
        .mobile-only-btn,
        .btn-close-modal {
            display: none;
        }

        /* Mobile Modal Styles & Layout Fixes */
        @media (max-width: 900px) {

            #global-footer,
            #global-header {
                display: none !important;
            }

            body,
            html {
                height: 100%;
                overflow: auto;
            }

            main {
                min-height: calc(100vh - 140px);
                height: auto;
                display: block;
                padding: 1rem 0 !important;
            }

            section {
                padding: 1rem 0 !important;
            }

            .controls {
                margin-top: 1rem;
                gap: 0.5rem;
                padding-bottom: 2rem;
            }

            .mobile-only-btn {
                display: flex !important;
                background: rgba(255, 255, 255, 0.15) !important;
                border: 1px solid rgba(255, 255, 255, 0.3) !important;
            }

            #gameSidebar {
                display: none !important;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 9999;
                border: none;
                margin: 0;
                background: #1a1a1e;
                overflow-y: auto;
                padding-top: 4rem;
                -webkit-overflow-scrolling: touch;
            }

            #gameSidebar.active {
                display: flex !important;
                flex-direction: column;
            }

            .btn-close-modal {
                display: block !important;
                position: absolute;
                top: 1.5rem;
                right: 1.5rem;
                z-index: 10000;
                background: rgba(255, 0, 0, 0.2);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: white;
                padding: 0.5rem 1rem;
                border-radius: 50px;
                font-size: 1rem;
                cursor: pointer;
            }

            #board {
                max-width: 88vw !important;
                margin: 0 auto;
            }
        }

        /* Promotion Modal */
        #promotionModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        #promotionModal.active {
            display: flex;
        }

        .promotion-content {
            background: var(--surface-color);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--primary-color);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .promotion-title {
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .promotion-options {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .promotion-piece {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .promotion-piece:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--primary-color);
            transform: translateY(-5px);
        }

        .promotion-piece img {
            width: 50px;
            height: 50px;
        }

        /* ===== Page-level Tab Bar ===== */
        .page-tabs {
            display: flex;
            gap: 0.25rem;
            margin-bottom: 0;
            border-bottom: 2px solid rgba(255, 255, 255, 0.06);
            padding: 0 0.25rem;
        }

        .page-tab {
            padding: 0.55rem 1.5rem;
            background: transparent;
            border: none;
            color: var(--text-muted, rgba(255,255,255,0.5));
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 2.5px solid transparent;
            margin-bottom: -2px;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-family: inherit;
            border-radius: 6px 6px 0 0;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .page-tab i {
            font-size: 0.8rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .page-tab:hover {
            color: rgba(255, 255, 255, 0.85);
            background: rgba(255, 255, 255, 0.04);
        }

        .page-tab:hover i {
            opacity: 1;
        }

        .page-tab.active {
            color: var(--primary-color, #d4af37);
            border-bottom-color: var(--primary-color, #d4af37);
            background: rgba(212, 175, 55, 0.06);
        }

        .page-tab.active i {
            opacity: 1;
        }

        /* ===== Sidebar panels ===== */
        .sidebar-panel {
            display: none;
            flex-direction: column;
            gap: 0.75rem;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            min-width: 0;
        }

        .sidebar-panel.active {
            display: flex;
        }

        /* ===== Diagram Editor Toolbar ===== */
        .editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            padding: 0.5rem;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            align-items: center;
        }

        .editor-toolbar .tool-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.8rem;
        }

        .editor-toolbar .tool-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .editor-toolbar .tool-btn.active {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--primary-color, #d4af37);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.15);
        }

        .editor-toolbar .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        /* Diagram sub-tabs */
        .diagram-tabs {
            display: flex;
            gap: 0.25rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 0;
        }

        .diagram-tab {
            flex: 1;
            padding: 0.45rem 0.75rem;
            background: transparent;
            border: none;
            color: var(--text-muted, rgba(255,255,255,0.5));
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            font-family: inherit;
        }

        /* Diagram section containers */
        .diagram-section {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .diagram-section-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary-color, #d4af37);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.2rem 0;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .diagram-section-label i {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        /* Diagram action buttons row */
        .diagram-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .diagram-actions .btn-control {
            flex: 1;
            min-width: 0;
            justify-content: center;
            padding: 0.5rem 0.4rem;
            font-size: 0.78rem;
            gap: 0.3rem;
        }

        /* Castling checks */
        .castling-check {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.7rem;
            cursor: pointer;
        }

        .castling-check input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: var(--primary-color, #d4af37);
        }

        /* Piece palette */
        .palette-piece {
            width: 28px;
            height: 28px;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid transparent;
            transition: all 0.15s;
            padding: 1px;
        }

        .palette-piece:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .palette-piece.active {
            border-color: var(--primary-color, #d4af37);
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 6px rgba(212, 175, 55, 0.2);
        }

        /* ===== Diagram overlay on main board ===== */
        #boardOverlaySvg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
        }

        #boardOverlaySvg.drawing-active {
            pointer-events: auto;
            cursor: crosshair;
        }

        /* ===== Playback controls polish ===== */
        .playback-controls {
            display: flex;
            justify-content: center;
            gap: 0.35rem;
            margin-bottom: 0.5rem;
        }

        .playback-controls .btn-control {
            width: 40px;
            height: 36px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            border-radius: 6px;
        }

        .playback-controls .btn-control:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* ===== Bottom controls row ===== */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.75rem;
        }

        .controls .btn-control {
            padding: 0.4rem 0.7rem;
            font-size: 0.8rem;
            gap: 0.35rem;
        }

        /* ===== Responsive ===== */
        @media (max-width: 900px) {
            .page-tabs {
                padding: 0;
            }

            .page-tab {
                padding: 0.45rem 1rem;
                font-size: 0.8rem;
            }

            .editor-toolbar {
                padding: 0.35rem;
                gap: 0.2rem;
            }

            .editor-toolbar .tool-btn {
                width: 28px;
                height: 28px;
                font-size: 0.7rem;
            }

            .editor-toolbar .color-dot {
                width: 12px;
                height: 12px;
            }

            .palette-piece {
                width: 24px;
                height: 24px;
            }

            .controls {
                gap: 0.3rem;
            }

            .controls .btn-control {
                padding: 0.35rem 0.5rem;
                font-size: 0.75rem;
            }

            .diagram-actions .btn-control {
                font-size: 0.72rem;
                padding: 0.4rem 0.3rem;
            }

            .playback-controls .btn-control {
                width: 36px;
                height: 32px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <header id="global-header"></header>

    <main>
        <!-- Reduced top margin and padding to fit board on screen -->
        <section class="hero-small" style="text-align: center; padding: 0.5rem 0; margin-top: 100px;">
            <div class="container">
                <h1 style="font-size: 1.8rem; margin: 0;"><i class="fa-solid fa-chess-board"></i> Editor Partií</h1>
            </div>
        </section>

        <section style="padding: 0.5rem 0;">
            <div class="container">

                <!-- Page-level Tab Bar -->
                <div class="page-tabs">
                    <button class="page-tab active" onclick="switchPageTab('partie')" data-page-tab="partie">
                        <i class="fa-solid fa-chess-board"></i> Partie
                    </button>
                    <button class="page-tab auth-only" onclick="switchPageTab('diagram')" data-page-tab="diagram">
                        <i class="fa-solid fa-pen-ruler"></i> Diagramy
                    </button>
                    <button class="page-tab auth-only" onclick="switchPageTab('hadanky')" data-page-tab="hadanky">
                        <i class="fa-solid fa-puzzle-piece"></i> Hádanky
                    </button>
                </div>

                <div class="editor-container">

                    <!-- Left: Board -->
                    <div>
                        <!-- Playback Controls Above Board -->
                        <div class="playback-controls">
                            <button class="btn-control" onclick="goToStart()" title="Na začátek">
                                <i class="fa-solid fa-backward-fast"></i>
                            </button>
                            <button class="btn-control" onclick="goBack()" title="Předchozí tah">
                                <i class="fa-solid fa-backward-step"></i>
                            </button>
                            <button class="btn-control" id="autoplayBtn" onclick="toggleAutoplay()"
                                title="Přehrát partii">
                                <i class="fa-solid fa-play"></i>
                            </button>
                            <button class="btn-control" onclick="goForward()" title="Další tah">
                                <i class="fa-solid fa-forward-step"></i>
                            </button>
                            <button class="btn-control" onclick="goToEnd()" title="Na konec">
                                <i class="fa-solid fa-forward-fast"></i>
                            </button>
                            <!-- Capture Diagram Button - Removed, using page tab instead -->
                        </div>
                        <div id="recorder-board-overlay" style="
                                margin-bottom: 10px;
                                background: rgba(0, 0, 0, 0.6);
                                color: #fff;
                                padding: 0.8rem;
                                border-radius: 6px;
                                font-size: 0.95em;
                                display: none;
                                border-left: 4px solid #4ade80;
                            "></div>
                        <div class="gv2-board-area" id="recBoardArea" style="width: 100%; max-width: 570px;">
                            <div class="gv2-eval-bar" id="recEvalBar">
                                <div class="gv2-eval-fill" id="recEvalFill" style="height: 50%;"></div>
                                <div class="gv2-eval-text" id="recEvalText">0.0</div>
                            </div>
                            <div style="position: relative; flex: 1; min-width: 0;">
                                <div id="board"></div>
                                <!-- Annotation overlay - shared by diagram editor -->
                                <svg id="boardOverlaySvg"></svg>
                            </div>
                        </div>
                        <div class="gv2-analysis-info" id="recAnalysisInfo" style="display: none;">
                            <div class="gv2-analysis-row">
                                <span class="gv2-best-move" id="recBestMove">—</span>
                            </div>
                            <div class="gv2-pv-line" id="recPvLine"></div>
                        </div>
                        <!-- Partie Controls (visible when Partie tab active) -->
                        <div class="controls controls-partie" style="margin-top: 1rem;">
                            <button class="btn-control" onclick="resetEditor()"><i class="fa-solid fa-rotate-left"></i>
                                Reset</button>
                            <button class="btn-control" onclick="board.flip()"><i class="fa-solid fa-retweet"></i>
                                Otočit</button>
                            <button class="btn-control" onclick="undoMove()"><i class="fa-solid fa-arrow-left"></i>
                                Zpět</button>
                            <button class="btn-control" id="recEngineBtn" onclick="toggleRecorderEngine()"
                                title="Zapnout/vypnout analýzu enginem"
                                style="border-color: rgba(74, 222, 128, 0.3); color: rgba(74, 222, 128, 0.7);">
                                <i class="fa-solid fa-microchip"></i> <span class="desktop-text">Motor</span>
                            </button>
                            <button class="btn-control mobile-only-btn">
                                <i class="fa-solid fa-info-circle"></i> Info
                            </button>
                            <a href="/members" class="btn-control"
                                style="background: rgba(255, 0, 0, 0.2); border-color: rgba(255, 0, 0, 0.3); color: #fca5a5; text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">
                                <i class="fa-solid fa-right-from-bracket"></i> <span class="desktop-text"
                                    style="margin-left: 0.5rem;">Odejít</span>
                            </a>
                        </div>

                        <!-- Diagram Controls (visible when Diagram tab active) -->
                        <div class="controls controls-diagram" style="margin-top: 1rem; display: none;">
                            <button class="btn-control" onclick="board.flip()"><i class="fa-solid fa-retweet"></i>
                                Otočit</button>
                            <button class="btn-control" id="recEngineBtnDiag" onclick="toggleRecorderEngine()"
                                title="Zapnout/vypnout analýzu enginem"
                                style="border-color: rgba(74, 222, 128, 0.3); color: rgba(74, 222, 128, 0.7);">
                                <i class="fa-solid fa-microchip"></i> <span class="desktop-text">Motor</span>
                            </button>
                            <button class="btn-control" onclick="loadFenIntoDiagram('start')" title="Základní pozice">
                                <i class="fa-solid fa-chess-board"></i> <span class="desktop-text">Start</span>
                            </button>
                            <button class="btn-control" onclick="loadFenIntoDiagram('8/8/8/8/8/8/8/8 w - - 0 1')" title="Prázdná šachovnice">
                                <i class="fa-solid fa-border-all"></i> <span class="desktop-text">Prázdná</span>
                            </button>
                            <button class="btn-control" onclick="clearDiagram()" title="Vymazat anotace">
                                <i class="fa-solid fa-eraser"></i> <span class="desktop-text">Vymazat</span>
                            </button>
                        </div>
                    </div>

                    <!-- Right: Info & Moves (Desktop Sidebar / Mobile Modal Content) -->
                    <div id="gameSidebar" class="sidebar">

                        <!-- Close button for mobile modal -->
                        <button class="btn-close-modal">
                            <i class="fa-solid fa-times"></i> Zavřít
                        </button>

                        <!-- ========== PANEL 1: PARTIE (Game Recorder) ========== -->
                        <div id="panelPartie" class="sidebar-panel active">

                        <!-- Metadata Form: Compact Grid -->
                        <div style="display: grid; grid-template-columns: 1fr 1fr 80px; gap: 0.5rem; align-items: end;">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label style="font-size: 0.8rem; margin-bottom: 0.2rem;">Bílý</label>
                                <input type="text" id="whitePlayer" placeholder="Jméno" style="padding: 0.5rem;">
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label style="font-size: 0.8rem; margin-bottom: 0.2rem;">Černý</label>
                                <input type="text" id="blackPlayer" placeholder="Jméno" style="padding: 0.5rem;">
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label style="font-size: 0.8rem; margin-bottom: 0.2rem;">Výsledek</label>
                                <select id="result" style="padding: 0.5rem;">
                                    <option value="*">*</option>
                                    <option value="1-0">1-0</option>
                                    <option value="0-1">0-1</option>
                                    <option value="1/2-1/2">½-½</option>
                                </select>
                            </div>
                        </div>

                        <!-- Move List: Collapsible Toggle -->
                        <div style="display: flex; flex-direction: column; min-height: 0;">
                            <!-- Move list toggle header -->
                            <div onclick="toggleMoveListPanel()" style="display:flex; align-items:center; gap:0.4rem; cursor:pointer; padding:0.4rem 0; margin-bottom: 0.3rem;">
                                <i class="fa-solid fa-list-ol" style="color: var(--text-muted); font-size: 0.75rem;"></i>
                                <span style="font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em;">Průběh partie</span>
                                <span id="moveCountBadge" style="font-size: 0.65rem; background: rgba(255,255,255,0.08); color: var(--text-muted); padding: 1px 6px; border-radius: 8px; margin-left: 0.2rem;">0</span>
                                <i class="fa-solid fa-chevron-down" id="moveListToggleIcon" style="font-size: 0.55rem; color: var(--text-muted); margin-left: auto; transition: transform 0.2s;"></i>
                            </div>
                            <div id="moveListWrapper" style="display: block;">
                                <div id="moveList" class="move-list"
                                    style="height: auto; border: 1px solid rgba(255,255,255,0.05); max-height: 160px; overflow-y: auto;">
                                    <!-- Moves will go here -->
                                </div>
                            </div>

                            <!-- NAG + Comment: compact row -->
                            <div style="display: flex; gap: 0.3rem; margin-top: 0.5rem; flex-wrap: wrap; align-items: center;">
                                <button class="btn-control" onclick="toggleNag('$1')"
                                    style="padding: 0.2rem 0.5rem; font-weight: bold; color: #4ade80; font-size: 0.8rem;"
                                    title="Dobrý tah (!)">!</button>
                                <button class="btn-control" onclick="toggleNag('$2')"
                                    style="padding: 0.2rem 0.5rem; font-weight: bold; color: #f87171; font-size: 0.8rem;"
                                    title="Chyba (?)">?</button>
                                <button class="btn-control" onclick="toggleNag('$3')"
                                    style="padding: 0.2rem 0.5rem; font-weight: bold; color: #22c55e; font-size: 0.8rem;"
                                    title="Výborný tah (!!)">!!</button>
                                <button class="btn-control" onclick="toggleNag('$4')"
                                    style="padding: 0.2rem 0.5rem; font-weight: bold; color: #ef4444; font-size: 0.8rem;"
                                    title="Hrubá chyba (??)">??</button>
                                <button class="btn-control" onclick="toggleNag('$5')"
                                    style="padding: 0.2rem 0.5rem; font-weight: bold; color: #60a5fa; font-size: 0.8rem;"
                                    title="Zajímavý tah (!?)">!?</button>
                                <button class="btn-control" onclick="toggleNag('$6')"
                                    style="padding: 0.2rem 0.5rem; font-weight: bold; color: #fbbf24; font-size: 0.8rem;"
                                    title="Pochybný tah (?!)">?!</button>
                            </div>

                            <!-- Comment Section: compact -->
                            <div style="margin-top: 0.4rem; margin-bottom: 0;">
                                <textarea id="moveComment" placeholder="Komentář k tahu..."
                                    style="width: 100%; height: 50px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 0.4rem; border-radius: 6px; font-family: inherit; resize: vertical; font-size: 0.8rem; box-sizing: border-box;"></textarea>
                            </div>

                            <!-- PGN Actions: compact -->
                            <div style="display:flex; gap:0.4rem; margin: 0.5rem 0; flex-wrap: wrap;">
                                <button class="btn-control" onclick="copyPgn()"
                                    style="font-size:0.75rem; padding:0.3rem 0.6rem;"><i class="fa-solid fa-copy"></i>
                                    PGN</button>
                                <button class="btn-control" onclick="downloadPgn()"
                                    style="font-size:0.75rem; padding:0.3rem 0.6rem;"><i
                                        class="fa-solid fa-download"></i> Stáhnout</button>
                                <button class="btn-control auth-only" onclick="showImportPgnModal()"
                                    style="font-size:0.75rem; padding:0.3rem 0.6rem; background: rgba(74, 222, 128, 0.1); border-color: rgba(74, 222, 128, 0.3);"><i
                                        class="fa-solid fa-file-import"></i> Import</button>
                            </div>

                            <!-- Fragment Export -->
                            <div id="fragmentExportSection" class="auth-only"
                                style="display:block; padding:0.5rem 0.6rem; background:rgba(96,165,250,0.06); border-radius:8px; border:1px solid rgba(96,165,250,0.2); margin-bottom:0.5rem;">
                                <div style="margin-bottom:0.35rem;">
                                    <i class="fa-solid fa-scissors" style="color:#60a5fa; font-size:0.7rem; vertical-align:middle;"></i>
                                    <span style="font-size:0.72rem; font-weight:600; color:#60a5fa; text-transform:uppercase; letter-spacing:0.03em; vertical-align:middle;">Fragment</span>
                                    <span id="fragmentMoveCount" style="font-size:0.6rem; color:var(--text-muted); float:right; line-height:1.6;"></span>
                                </div>
                                <!-- Range: Od -->
                                <div style="display:block; margin-bottom:2px;">
                                    <label style="display:inline-block; width:22px; font-size:0.68rem; color:var(--text-muted); vertical-align:middle;">Od</label>
                                    <input type="range" id="fragmentFrom" min="1" max="50" value="1"
                                        style="width:calc(100% - 60px); vertical-align:middle; accent-color:#60a5fa; height:14px; cursor:pointer;"
                                        oninput="document.getElementById('fragmentFromVal').textContent=this.value; updateFragmentPreview()">
                                    <span id="fragmentFromVal" style="display:inline-block; width:28px; text-align:right; font-size:0.72rem; color:#60a5fa; font-weight:600; vertical-align:middle;">1</span>
                                </div>
                                <!-- Range: Do -->
                                <div style="display:block; margin-bottom:0.35rem;">
                                    <label style="display:inline-block; width:22px; font-size:0.68rem; color:var(--text-muted); vertical-align:middle;">Do</label>
                                    <input type="range" id="fragmentTo" min="1" max="50" value="10"
                                        style="width:calc(100% - 60px); vertical-align:middle; accent-color:#60a5fa; height:14px; cursor:pointer;"
                                        oninput="document.getElementById('fragmentToVal').textContent=this.value; updateFragmentPreview()">
                                    <span id="fragmentToVal" style="display:inline-block; width:28px; text-align:right; font-size:0.72rem; color:#60a5fa; font-weight:600; vertical-align:middle;">10</span>
                                </div>
                                <!-- Preview -->
                                <div id="fragmentPreview"
                                    style="display:block; font-family:monospace; font-size:0.68rem; color:#aaa; padding:0.25rem 0.3rem; background:rgba(0,0,0,0.3); border-radius:4px; max-height:2rem; overflow:hidden; margin-bottom:0.3rem; line-height:1.25; border:1px solid rgba(96,165,250,0.08); white-space:nowrap; text-overflow:ellipsis;">
                                    <span style="color:var(--text-muted);">Nahraj partii...</span>
                                </div>
                                <!-- Title + Buttons: single row -->
                                <div style="display:block; margin-bottom:0.2rem;">
                                    <input type="text" id="fragmentTitle" placeholder="Název fragmentu"
                                        style="display:block; width:100%; padding:3px 6px; background:rgba(0,0,0,0.25); border:1px solid rgba(96,165,250,0.12); color:#fff; border-radius:4px; font-size:0.7rem; margin-bottom:0.3rem; box-sizing:border-box;">
                                    <button onclick="copyFragment()"
                                        style="display:inline-block; font-size:0.68rem; padding:3px 8px; background:rgba(96,165,250,0.08); border:1px solid rgba(96,165,250,0.25); color:#60a5fa; border-radius:5px; cursor:pointer; margin-right:3px; vertical-align:middle;">
                                        <i class="fa-solid fa-copy"></i> Kopírovat
                                    </button>
                                    <button onclick="saveFragmentToCloud()"
                                        style="display:inline-block; font-size:0.68rem; padding:3px 8px; background:rgba(74,222,128,0.08); border:1px solid rgba(74,222,128,0.25); color:#4ade80; border-radius:5px; cursor:pointer; vertical-align:middle;">
                                        <i class="fa-solid fa-cloud-arrow-up"></i> Uložit
                                    </button>
                                </div>
                                <p id="fragmentStatus" style="text-align:center; margin:0; min-height:0.5rem; font-size:0.65rem; color:var(--text-muted);"></p>
                            </div>

                            <button class="main-btn auth-only" onclick="saveGame()"
                                style="margin-top: 0; padding: 0.7rem;">
                                <i class="fa-solid fa-save"></i> Uložit Partii
                            </button>
                            <p id="saveStatus"
                                style="text-align: center; margin-top: 0.2rem; min-height: 1rem; font-size: 0.85rem; margin-bottom: 0;">
                            </p>

                        </div>

                        </div> <!-- end #panelPartie -->

                        <!-- ========== PANEL 2: DIAGRAMY (Editor — merged) ========== -->
                        <div id="panelDiagram" class="sidebar-panel auth-only">

                            <!-- SECTION: Pozice (Position Setup) -->
                            <div class="diagram-section">
                                <div class="diagram-section-label"><i class="fa-solid fa-chess"></i> Pozice</div>
                                <!-- Turn + FEN row -->
                                <div style="display: flex; gap: 0.5rem; align-items: center; background: rgba(0,0,0,0.2); border-radius: 6px; padding: 0.4rem 0.5rem;">
                                    <div style="display: flex; gap: 0.25rem; flex-shrink: 0;">
                                        <button id="turnWhiteBtn" class="tool-btn active" onclick="setDiagramTurn('w')" title="Bílý na tahu" style="width:28px; height:28px; font-size:0.85rem;">⬜</button>
                                        <button id="turnBlackBtn" class="tool-btn" onclick="setDiagramTurn('b')" title="Černý na tahu" style="width:28px; height:28px; font-size:0.85rem;">⬛</button>
                                    </div>
                                    <input type="text" id="diagramFenInput" placeholder="FEN..."
                                        style="flex: 1; padding: 0.25rem 0.4rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 4px; font-family: monospace; font-size: 0.7rem; min-width: 0;">
                                    <button class="tool-btn" onclick="loadFenIntoDiagram()" title="Načíst FEN" style="width:28px; height:28px; font-size:0.75rem;">✓</button>
                                </div>
                                <!-- Castling -->
                                <div style="display: flex; gap: 0.5rem; align-items: center; background: rgba(0,0,0,0.15); border-radius: 6px; padding: 0.3rem 0.5rem; flex-wrap: wrap;">
                                    <span style="font-size: 0.65rem; color: var(--text-muted);">Rošáda:</span>
                                    <label class="castling-check" title="Bílý krátká"><input type="checkbox" id="castleWK" checked onchange="updateCastlingRights()"><span>⬜K</span></label>
                                    <label class="castling-check" title="Bílý dlouhá"><input type="checkbox" id="castleWQ" checked onchange="updateCastlingRights()"><span>⬜Q</span></label>
                                    <label class="castling-check" title="Černý krátká"><input type="checkbox" id="castleBK" checked onchange="updateCastlingRights()"><span>⬛K</span></label>
                                    <label class="castling-check" title="Černý dlouhá"><input type="checkbox" id="castleBQ" checked onchange="updateCastlingRights()"><span>⬛Q</span></label>
                                </div>
                                <!-- Piece Palette -->
                                <div id="piecePalette" style="display: flex; gap: 0.2rem; align-items: center; flex-wrap: wrap; background: rgba(0,0,0,0.15); border-radius: 6px; padding: 0.35rem 0.4rem;">
                                    <img src="/img/chesspieces/wikipedia/wK.png" class="palette-piece" data-piece="wK" title="Bílý král" draggable="true">
                                    <img src="/img/chesspieces/wikipedia/wQ.png" class="palette-piece" data-piece="wQ" title="Bílá dáma" draggable="true">
                                    <img src="/img/chesspieces/wikipedia/wR.png" class="palette-piece" data-piece="wR" title="Bílá věž" draggable="true">
                                    <img src="/img/chesspieces/wikipedia/wB.png" class="palette-piece" data-piece="wB" title="Bílý střelec" draggable="true">
                                    <img src="/img/chesspieces/wikipedia/wN.png" class="palette-piece" data-piece="wN" title="Bílý jezdec" draggable="true">
                                    <img src="/img/chesspieces/wikipedia/wP.png" class="palette-piece" data-piece="wP" title="Bílý pěšec" draggable="true">
                                    <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.12); margin: 0 0.1rem;"></div>
                                    <img src="/img/chesspieces/wikipedia/bK.png" class="palette-piece" data-piece="bK" title="Černý král" draggable="true">
                                    <img src="/img/chesspieces/wikipedia/bQ.png" class="palette-piece" data-piece="bQ" title="Černá dáma" draggable="true">
                                    <img src="/img/chesspieces/wikipedia/bR.png" class="palette-piece" data-piece="bR" title="Černá věž" draggable="true">
                                    <img src="/img/chesspieces/wikipedia/bB.png" class="palette-piece" data-piece="bB" title="Černý střelec" draggable="true">
                                    <img src="/img/chesspieces/wikipedia/bN.png" class="palette-piece" data-piece="bN" title="Černý jezdec" draggable="true">

    <script>
        // Page-level tab switching (Partie / Diagram)
        let currentPageTab = 'partie';

        function switchPageTab(tabName) {
            currentPageTab = tabName;

            // Update tab buttons
            document.querySelectorAll('.page-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.pageTab === tabName);
            });

            // Update sidebar panels
            document.getElementById('panelPartie').classList.toggle('active', tabName === 'partie');
            document.getElementById('panelDiagram').classList.toggle('active', tabName === 'diagram');
            const panelHadanky = document.getElementById('panelHadanky');
            if (panelHadanky) panelHadanky.classList.toggle('active', tabName === 'hadanky');

            // Toggle overlay SVG interactivity (active for both diagram and hadanky)
            const overlay = document.getElementById('boardOverlaySvg');
            if (overlay) {
                overlay.classList.toggle('drawing-active', tabName === 'diagram');
            }

            // Show/hide playback controls (only for Partie)
            const playbackControls = document.querySelector('.playback-controls');
            if (playbackControls) {
                playbackControls.style.display = tabName === 'partie' ? 'flex' : 'none';
            }

            // Toggle bottom control bars
            const partieControls = document.querySelector('.controls-partie');
            const diagramControls = document.querySelector('.controls-diagram');
            if (partieControls) partieControls.style.display = tabName === 'partie' ? 'flex' : 'none';
            if (diagramControls) diagramControls.style.display = (tabName === 'diagram' || tabName === 'hadanky') ? 'flex' : 'none';

            // Sync engine button states
            if (typeof recEngineActive !== 'undefined' && recEngineActive) {
                const btns = [document.getElementById('recEngineBtn'), document.getElementById('recEngineBtnDiag')];
                btns.forEach(btn => {
                    if (btn) {
                        btn.style.background = 'rgba(74, 222, 128, 0.2)';
                        btn.style.borderColor = 'rgba(74, 222, 128, 0.5)';
                        btn.style.color = '#4ade80';
                    }
                });
            }

            // When entering diagram/hadanky tab, initialize board state
            if (tabName === 'diagram' || tabName === 'hadanky') {
                if (typeof initDiagramFromBoard === 'function') {
                    initDiagramFromBoard();
                }
            }

            // When leaving diagram/hadanky → disable drawing mode, restore move interaction
            if (tabName === 'partie') {
                if (typeof window.activePieceTool !== 'undefined') window.activePieceTool = null;
                if (typeof window.isDrawing !== 'undefined') window.isDrawing = false;
                // Remove pointer-events from SVG overlay so chessboard gets clicks
                const svgOvl = document.getElementById('boardOverlaySvg');
                if (svgOvl) svgOvl.style.pointerEvents = 'none';
            } else {
                // In diagram/hadanky, SVG overlay needs pointer events for drawing
                const svgOvl = document.getElementById('boardOverlaySvg');
                if (svgOvl) svgOvl.style.pointerEvents = '';
            }

            // Re-trigger engine analysis for the new context
            if (typeof analyzeCurrentPosition === 'function') {
                analyzeCurrentPosition();
            }
        }

        // ========================================
        // FRAGMENT EXPORT
        // ========================================

        function toggleMoveListPanel() {
            const wrapper = document.getElementById('moveListWrapper');
            const icon = document.getElementById('moveListToggleIcon');
            if (!wrapper) return;
            const isHidden = wrapper.style.display === 'none';
            wrapper.style.display = isHidden ? 'block' : 'none';
            if (icon) icon.style.transform = isHidden ? '' : 'rotate(-90deg)';
        }

        // Legacy — fragment panel is always visible now
        function toggleFragmentPanel() {}

        /**
         * Extract a fragment (subset of moves) from the main line.
         * @param {number} fromMove - Starting move number (1-based, full moves)
         * @param {number} toMove - Ending move number (1-based, full moves)
         * @returns {{ pgn: string, startFen: string, moves: string[], totalMoves: number }}
         */
        function extractFragment(fromMove, toMove) {
            const mainLine = getMainLine();
            const totalMoves = Math.ceil(mainLine.length / 2);

            if (mainLine.length === 0) {
                return { pgn: '', startFen: '', moves: [], totalMoves: 0 };
            }

            // Clamp values
            fromMove = Math.max(1, Math.min(fromMove, totalMoves));
            toMove = Math.max(fromMove, Math.min(toMove, totalMoves));

            // Convert move numbers to ply range (1-based)
            const fromPly = (fromMove - 1) * 2; // ply index in mainLine array (0-based)
            const toPly = toMove * 2;            // exclusive end

            // Get the FEN before the first move in the range
            // If fromMove == 1, it's the starting position (moveTreeRoot.fen)
            let startFen;
            if (fromPly === 0) {
                startFen = moveTreeRoot.fen;
            } else {
                startFen = mainLine[fromPly - 1].fen;
            }

            // Extract the moves in range
            const selectedNodes = mainLine.slice(fromPly, Math.min(toPly, mainLine.length));

            // Build PGN text with move numbers
            let pgn = '';
            let pgnLines = [];
            for (let i = 0; i < selectedNodes.length; i++) {
                const node = selectedNodes[i];
                const globalPly = fromPly + i + 1; // 1-based ply
                const moveNum = Math.ceil(globalPly / 2);
                const isWhite = (globalPly % 2 === 1);

                if (isWhite) {
                    pgnLines.push(`${moveNum}. ${node.san}`);
                } else {
                    if (i === 0) {
                        // First move is black → show dots
                        pgnLines.push(`${moveNum}... ${node.san}`);
                    } else {
                        pgnLines.push(node.san);
                    }
                }

                // Add NAG/comment
                if (node.nag) pgnLines.push(node.nag);
                if (moveNags[node.fen]) pgnLines.push(moveNags[node.fen]);
                if (node.comment) pgnLines.push(`{${node.comment}}`);
                if (moveComments[node.fen]) pgnLines.push(`{${moveComments[node.fen]}}`);
            }

            pgn = pgnLines.join(' ');

            return {
                pgn,
                startFen,
                moves: selectedNodes.map(n => n.san),
                totalMoves,
                fromMove,
                toMove
            };
        }

        function updateFragmentPreview() {
            const fromInput = document.getElementById('fragmentFrom');
            const toInput = document.getElementById('fragmentTo');
            const preview = document.getElementById('fragmentPreview');
            const countSpan = document.getElementById('fragmentMoveCount');
            const fromVal = document.getElementById('fragmentFromVal');
            const toVal = document.getElementById('fragmentToVal');

            if (!fromInput || !toInput || !preview) return;

            const mainLine = getMainLine();
            const totalMoves = Math.ceil(mainLine.length / 2);

            // Update max on sliders
            fromInput.max = totalMoves || 1;
            toInput.max = totalMoves || 1;

            // Sync value display
            if (fromVal) fromVal.textContent = fromInput.value;
            if (toVal) toVal.textContent = toInput.value;

            if (mainLine.length === 0) {
                preview.innerHTML = '<span style="color: var(--text-muted);">Partie je prázdná</span>';
                if (countSpan) countSpan.textContent = '';
                return;
            }

            const from = parseInt(fromInput.value) || 1;
            const to = parseInt(toInput.value) || totalMoves;

            const fragment = extractFragment(from, to);

            if (fragment.pgn) {
                preview.textContent = fragment.pgn;
                if (countSpan) countSpan.textContent = `${fragment.moves.length} tahů`;
            } else {
                preview.innerHTML = '<span style="color: var(--text-muted);">Žádné tahy v rozsahu</span>';
                if (countSpan) countSpan.textContent = '';
            }
        }

        function copyFragment() {
            const fromInput = document.getElementById('fragmentFrom');
            const toInput = document.getElementById('fragmentTo');
            const status = document.getElementById('fragmentStatus');

            const from = parseInt(fromInput.value) || 1;
            const to = parseInt(toInput.value) || 99;
            const fragment = extractFragment(from, to);

            if (!fragment.pgn) {
                if (status) { status.style.color = '#f87171'; status.textContent = 'Žádné tahy k exportu'; }
                return;
            }

            // Build full PGN with headers
            const white = document.getElementById('whitePlayer')?.value || '?';
            const black = document.getElementById('blackPlayer')?.value || '?';
            const title = document.getElementById('fragmentTitle')?.value || '';
            const header = [
                `[White "${white}"]`,
                `[Black "${black}"]`,
                `[SetUp "1"]`,
                `[FEN "${fragment.startFen}"]`,
                title ? `[Title "${title}"]` : '',
                `[Fragment "${fragment.fromMove}-${fragment.toMove}"]`,
                ''
            ].filter(Boolean).join('\n');

            const fullPgn = header + '\n' + fragment.pgn;

            navigator.clipboard.writeText(fullPgn).then(() => {
                if (status) { status.style.color = '#4ade80'; status.textContent = '✓ Fragment zkopírován!'; }
                setTimeout(() => { if (status) status.textContent = ''; }, 3000);
            }).catch(() => {
                if (status) { status.style.color = '#f87171'; status.textContent = 'Kopírování selhalo'; }
            });
        }

        async function saveFragmentToCloud() {
            const fromInput = document.getElementById('fragmentFrom');
            const toInput = document.getElementById('fragmentTo');
            const status = document.getElementById('fragmentStatus');

            const from = parseInt(fromInput.value) || 1;
            const to = parseInt(toInput.value) || 99;
            const fragment = extractFragment(from, to);

            if (!fragment.pgn) {
                if (status) { status.style.color = '#f87171'; status.textContent = 'Žádné tahy k exportu'; }
                return;
            }

            const title = document.getElementById('fragmentTitle')?.value || '';
            const white = document.getElementById('whitePlayer')?.value || '?';
            const black = document.getElementById('blackPlayer')?.value || '?';

            const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
            if (!token) {
                if (status) { status.style.color = '#f87171'; status.textContent = 'Pro uložení se musíte přihlásit'; }
                return;
            }

            try {
                if (status) { status.style.color = '#60a5fa'; status.textContent = 'Ukládám...'; }

                const res = await fetch(`${API_URL}/fragments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        title: title || `${white} vs ${black} (${from}-${to})`,
                        pgn: fragment.pgn,
                        startFen: fragment.startFen,
                        fromMove: fragment.fromMove,
                        toMove: fragment.toMove,
                        sourceGameId: currentGameId,
                        white, black
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    if (status) { status.style.color = '#4ade80'; status.textContent = `✓ Fragment #${data.id} uložen!`; }
                    setTimeout(() => { if (status) status.textContent = ''; }, 4000);
                } else {
                    throw new Error(`HTTP ${res.status}`);
                }
            } catch (e) {
                console.error('Fragment save error:', e);
                if (status) { status.style.color = '#f87171'; status.textContent = 'API zatím není dostupná — Fragment zkopírován do schránky'; }
                // Fallback: copy to clipboard
                copyFragment();
            }
        }
    </script>

    <style>
        .auth-only {
            display: none !important;
        }

        .auth-only.auth-visible {
            display: inline-flex !important;
        }

        /* Fix for sidebar panels to inherit flex from auth-visible */
        .sidebar-panel.auth-only.auth-visible {
            display: flex !important;
        }

        .sidebar-panel.auth-only.auth-visible:not(.active) {
            display: none !important;
        }
    </style>
    <script>
        // Show auth-only elements when user is logged in
        (function () {
            function updateAuthElements() {
                const loggedIn = typeof auth !== 'undefined' && auth.isLoggedIn();
                document.querySelectorAll('.auth-only').forEach(el => {
                    if (loggedIn) el.classList.add('auth-visible');
                    else el.classList.remove('auth-visible');
                });
            }
            function waitForAuth() {
                if (typeof auth !== 'undefined') {
                    updateAuthElements();
                    auth.onChange(() => updateAuthElements());
                } else {
                    setTimeout(waitForAuth, 200);
                }
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', waitForAuth);
            } else {
                waitForAuth();
            }
        })();
    </script>
