    <!-- Critical CSS: ALL above-the-fold styles inlined so hero renders instantly without style.css -->
    <style>
        :root {
            --primary-color: #d4af37;
            --secondary-color: #1a1a1a;
            --background-color: #121212;
            --surface-color: #1e1e1e;
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
            --font-heading: 'Playfair Display', Georgia, serif;
            --border-radius: 8px;
            --transition-speed: .3s;
            --shadow: 0 4px 6px rgba(0, 0, 0, .3)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: var(--font-main);
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: var(--font-heading);
            color: var(--primary-color);
            margin-bottom: 1rem
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: color var(--transition-speed)
        }

        ul {
            list-style: none
        }

        img {
            max-width: 100%;
            display: block;
            border-radius: var(--border-radius)
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem
        }

        header {
            background-color: rgba(26, 26, 26, .95);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, .2);
            min-height: 60px
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: var(--font-heading);
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: .5rem
        }

        .hero {
            height: 40vh;
            min-height: 280px;
            padding-top: 1rem;
            padding-bottom: .5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-top: 70px
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            z-index: 1
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: 0
        }

        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0
        }

        .hero-content {
            width: 100%;
            max-width: 1200px;
            padding: 0 1rem;
            position: relative;
            z-index: 2
        }

        .hero-content h1 {
            font-size: 2.5rem;
            margin-bottom: .5rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, .7);
            font-weight: 700;
            line-height: 1.2;
            color: #fff
        }

        .hero-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            margin: .5rem auto 0;
            max-width: 280px;
            background: rgba(0, 0, 0, .4);
            padding: 4px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
            backdrop-filter: blur(4px)
        }

        @media(min-width:768px) {
            .hero-grid {
                grid-template-columns: repeat(4, 1fr);
                max-width: 500px
            }
        }

        .hero-grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1;
            border-radius: 8px;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: .65rem;
            letter-spacing: .5px;
            text-transform: uppercase;
            gap: 4px;
            transition: all .3s ease;
            text-decoration: none;
            border: 1px solid transparent;
            padding: .3rem
        }

        .hero-grid-item i {
            font-size: 1rem;
            transition: transform .3s ease
        }

        .hero-grid-item.light {
            background: rgba(240, 217, 181, .9);
            color: #1a1a1a
        }

        .hero-grid-item.dark {
            background: rgba(30, 30, 50, .85);
            color: #e0e0e0;
            border-color: rgba(212, 175, 55, .15)
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            margin: 3rem 0 2rem;
            position: relative;
            padding-bottom: .5rem
        }

        footer {
            background-color: #000;
            padding: 3rem 0;
            margin-top: 3rem;
            border-top: 1px solid rgba(255, 255, 255, .05);
            min-height: 800px
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            min-height: 700px
        }

        @media(max-width:768px) {
            .hero {
                align-items: flex-start;
                padding-top: 1.2rem;
                min-height: 320px
            }

            .hero-content h1 {
                display: block;
                font-size: .85rem;
                margin-bottom: .2rem;
                line-height: 1.2;
                opacity: .8;
                letter-spacing: .5px
            }

            .card-grid {
                min-height: 400px
            }

            footer {
                min-height: 1300px
            }
        }
    </style>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap"

            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap"

    <noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </noscript>

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SportsOrganization",
        "name": "Šachový oddíl TJ Bižuterie Jablonec nad Nisou",
        "alternateName": "TJ Bižuterie Jablonec – šachy",
        "url": "https://sachyjablonec.cz",

        "address": {
            "@type": "PostalAddress",

<body>
    <header id="global-header"></header>

    <main>
        <section class="hero">
            <picture class="hero-bg">
                <source media="(min-width: 768px)" srcset="images/hero-desktop.webp" type="image/webp">
                <img src="images/hero-mobile.webp" alt="" fetchpriority="high" loading="eager" decoding="async"
                    width="800" height="533">
            </picture>


            <div class="container hero-content">

                <h1><a href="/about" style="text-decoration: none; color: inherit;">Šachový oddíl<br>TJ Bižuterie
                        Jablonec</a></h1>

                <!-- Chess Board 2x2 Navigation -->
                <div class="hero-grid">

                    <!-- Aktuality - Light square (top-left) -->
                    <a href="#news" class="hero-grid-item light">
                        <i class="fa-solid fa-newspaper" style="color: #5d4037;"></i>
                        <span>Aktuality</span>
                    </a>

                    <!-- 3D Rotating Schedule Tile - Dark square (top-right) -->
                    <div id="match-rotator-tile"
                        style="perspective: 1000px; aspect-ratio: 1; cursor: pointer; overflow: hidden; border-radius: 0;">
                        <div class="rotator-inner"
                            style="position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d;">
                            <!-- Front Face -->
                            <div class="hero-grid-item dark face-front"
                                style="position: absolute; inset: 0; backface-visibility: hidden; z-index: 2; border: none; background: rgba(30, 30, 50, 0.85);">
                                <i class="fa-solid fa-chess-king" style="color: var(--primary-color);"></i>
                                <span>Rozpis zápasů</span>
                            </div>
                            <!-- Back Face -->
                            <div class="hero-grid-item dark face-back"
                                style="position: absolute; inset: 0; backface-visibility: hidden; transform: rotateY(180deg); background: linear-gradient(135deg, rgba(40,40,60,0.95) 0%, rgba(20,20,35,0.9) 100%); overflow: hidden; padding: 0.3rem; border: 1px solid rgba(212,175,55,0.3);">
                                <!-- Content injected by JS -->
                            </div>
                        </div>
                    </div>

                    <!-- Blicák - Dark square (bottom-left) -->
                    <a href="/blicak" class="hero-grid-item dark">
                        <i class="fa-solid fa-bolt" style="color: var(--primary-color);"></i>
                        <span>Blicák</span>
                    </a>

                    <!-- Mládež - Light square (bottom-right) -->
                    <a href="youth.html" class="hero-grid-item light">
                        <i class="fa-solid fa-child" style="color: #5d4037;"></i>
                        <span>Mládež</span>
                    </a>
                </div>

            </div>
        </section>

        <!-- Latest Comment Widget - Between hero and news -->
        <div id="latest-comment-widget" class="latest-comment-container hidden">
            <!-- Content injected by latest-comment.js -->
        </div>

        <section id="news" class="container">
            <h2 class="section-title">Novinky</h2>
            <div class="card-grid" id="newsGrid" data-news-limit="6">
                <!-- News will be dynamically loaded here -->
            </div>
        </section>
    </main>

    <style>
        /* Comment widget container */
        .latest-comment-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1rem;
            max-width: 900px;
            margin: 0.5rem auto 0;
            position: relative;
            z-index: 5;
        }

        .latest-comment-container.hidden {
            display: none;
        }

        .latest-comment-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(36, 36, 68, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            padding: 0.6rem 1.5rem;
            text-decoration: none;
            transition: all 0.3s ease;
            max-width: 900px;
            margin: 0 auto;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            font-size: 0.9rem;
            line-height: 1.2;
            pointer-events: auto;
            /* Re-enable clicks */
        }

        .latest-comment-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.6);
        }

        .lc-badge-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
            color: var(--primary-color);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .lc-time-inline {
            color: var(--text-muted);
            font-weight: 400;
            text-transform: none;
        }

        .lc-separator {
            width: 1px;
            height: 1.2em;
            background: rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .lc-content-inline {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            /* Enable truncation in flex item */
        }

        .lc-author {
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .lc-text {
            color: #d1d5db;
            font-style: italic;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lc-meta-inline {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .lc-article-title {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lc-time {
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .latest-comment-card {
                flex-direction: row;
                flex-wrap: wrap;
                border-radius: 10px;
                align-items: center;
                gap: 0.4rem;
                padding: 0.5rem 0.8rem;
                white-space: normal;
                line-height: 1.3;
                font-size: 0.75rem;
            }

            .lc-badge-wrapper {
                font-size: 0.7rem;
            }

            .lc-separator {
                display: none;
            }

            .desktop-only {
                display: none;
            }

            .lc-content-inline {
                flex: 1;
                min-width: 0;
            }

            .lc-text {
                display: -webkit-box;
                -webkit-line-clamp: 1;
                -webkit-box-orient: vertical;
                line-clamp: 1;
                overflow: hidden;
            }

            .lc-meta-inline {
                display: none;
            }

            .lc-article-title {
                max-width: none;
            }
        }
    </style>
