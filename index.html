    <!-- Critical CSS: inline hero + base styles so FCP/LCP don't wait for style.css -->
    <style>
        :root {
            --primary-color: #d4af37;
            --secondary-color: #1a1a1a;
            --background-color: #121212;
            --surface-color: #1e1e1e;
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
            --font-heading: 'Playfair Display', Georgia, serif;
            --border-radius: 8px;
            --transition-speed: .3s
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: var(--font-main);
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden
        }

        h1,
        h2 {
            font-family: var(--font-heading);
            color: var(--primary-color);
            margin-bottom: 1rem
        }

        header {
            background-color: rgba(26, 26, 26, .95);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, .2);
            min-height: 60px
        }

        .hero {
            height: 40vh;
            min-height: 280px;
            padding-top: 1rem;
            padding-bottom: .5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0, 0, 0, .7), rgba(0, 0, 0, .7)), url('images/hero-mobile.webp');
            background-size: cover;
            background-position: center;
            margin-top: 70px
        }

        @media(min-width:768px) {
            .hero {
                background-image: linear-gradient(rgba(0, 0, 0, .7), rgba(0, 0, 0, .7)), url('images/hero-desktop.webp')
            }
        }

        .hero h1 {
            font-size: clamp(1.4rem, 4vw, 2.8rem);
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, .5);
            margin-bottom: .5rem
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem
        }
    </style>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap"
            rel="stylesheet">
    </noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </noscript>
    <link rel="stylesheet" href="css/style.css">
    <!-- auth.css: non-blocking — only needed for admin login UI, not initial paint -->
    <link rel="stylesheet" href="css/auth.css?v=7" media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="css/auth.css?v=7">
    </noscript>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preload" as="image" href="images/hero-mobile.webp" media="(max-width: 767px)" fetchpriority="high">
    <link rel="preload" as="image" href="images/hero-desktop.webp" media="(min-width: 768px)" fetchpriority="high">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SportsOrganization",
        "name": "Šachový oddíl TJ Bižuterie Jablonec nad Nisou",
        "alternateName": "TJ Bižuterie Jablonec – šachy",
        "url": "https://sachyjablonec.cz",
        "logo": "https://sachyjablonec.cz/images/favicon.png",
        "sport": "Chess",
        "email": "info@sachyjablonec.cz",
        "telephone": "+420731183859",
        "address": {
            "@type": "PostalAddress",
            "streetAddress": "Městská hala – zasedací místnost",
            "addressLocality": "Jablonec nad Nisou",
            "addressCountry": "CZ"
        },
        "sameAs": [
            "https://www.chess.cz"
        ]
    }
    </script>
</head>

<body>
    <header id="global-header"></header>

    <main>
        <section class="hero">


            <div class="container hero-content">

                <h1><a href="/about" style="text-decoration: none; color: inherit;">Šachový oddíl<br>TJ Bižuterie
                        Jablonec</a></h1>

                <!-- Chess Board 2x2 Navigation -->
                <div class="hero-grid">

                    <!-- Aktuality - Light square (top-left) -->
                    <a href="#news" class="hero-grid-item light">
                        <i class="fa-solid fa-newspaper" style="color: #5d4037;"></i>
                        <span>Aktuality</span>
                    </a>

                    <!-- 3D Rotating Schedule Tile - Dark square (top-right) -->
                    <div id="match-rotator-tile"
                        style="perspective: 1000px; aspect-ratio: 1; cursor: pointer; overflow: hidden; border-radius: 0;">
                        <div class="rotator-inner"
                            style="position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d;">
                            <!-- Front Face -->
                            <div class="hero-grid-item dark face-front"
                                style="position: absolute; inset: 0; backface-visibility: hidden; z-index: 2; border: none; background: rgba(30, 30, 50, 0.85);">
                                <i class="fa-solid fa-chess-king" style="color: var(--primary-color);"></i>
                                <span>Rozpis zápasů</span>
                            </div>
                            <!-- Back Face -->
                            <div class="hero-grid-item dark face-back"
                                style="position: absolute; inset: 0; backface-visibility: hidden; transform: rotateY(180deg); background: linear-gradient(135deg, rgba(40,40,60,0.95) 0%, rgba(20,20,35,0.9) 100%); overflow: hidden; padding: 0.3rem; border: 1px solid rgba(212,175,55,0.3);">
                                <!-- Content injected by JS -->
                            </div>
                        </div>
                    </div>

                    <!-- Blicák - Dark square (bottom-left) -->
                    <a href="/blicak" class="hero-grid-item dark">
                        <i class="fa-solid fa-bolt" style="color: var(--primary-color);"></i>
                        <span>Blicák</span>
                    </a>

                    <!-- Mládež - Light square (bottom-right) -->
                    <a href="youth.html" class="hero-grid-item light">
                        <i class="fa-solid fa-child" style="color: #5d4037;"></i>
                        <span>Mládež</span>
                    </a>
                </div>

            </div>
        </section>

        <!-- Latest Comment Widget - Between hero and news -->
        <div id="latest-comment-widget" class="latest-comment-container hidden">
            <!-- Content injected by latest-comment.js -->
        </div>

        <section id="news" class="container">
            <h2 class="section-title">Novinky</h2>
            <div class="card-grid" id="newsGrid" data-news-limit="6">
                <!-- News will be dynamically loaded here -->
            </div>
        </section>
    </main>

    <style>
        /* Comment widget container */
        .latest-comment-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1rem;
            max-width: 900px;
            margin: 0.5rem auto 0;
            position: relative;
            z-index: 5;
        }

        .latest-comment-container.hidden {
            display: none;
        }

        .latest-comment-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(36, 36, 68, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            padding: 0.6rem 1.5rem;
            text-decoration: none;
            transition: all 0.3s ease;
            max-width: 900px;
            margin: 0 auto;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            font-size: 0.9rem;
            line-height: 1.2;
            pointer-events: auto;
            /* Re-enable clicks */
        }

        .latest-comment-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.6);
        }

        .lc-badge-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
            color: var(--primary-color);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .lc-time-inline {
            color: var(--text-muted);
            font-weight: 400;
            text-transform: none;
        }

        .lc-separator {
            width: 1px;
            height: 1.2em;
            background: rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .lc-content-inline {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            /* Enable truncation in flex item */
        }

        .lc-author {
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .lc-text {
            color: #d1d5db;
            font-style: italic;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lc-meta-inline {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .lc-article-title {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lc-time {
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .latest-comment-card {
                flex-direction: row;
                flex-wrap: wrap;
                border-radius: 10px;
                align-items: center;
                gap: 0.4rem;
                padding: 0.5rem 0.8rem;
                white-space: normal;
                line-height: 1.3;
                font-size: 0.75rem;
            }

            .lc-badge-wrapper {
                font-size: 0.7rem;
            }

            .lc-separator {
                display: none;
            }

            .desktop-only {
                display: none;
            }

            .lc-content-inline {
                flex: 1;
                min-width: 0;
            }

            .lc-text {
                display: -webkit-box;
                -webkit-line-clamp: 1;
                -webkit-box-orient: vertical;
                line-clamp: 1;
                overflow: hidden;
            }

            .lc-meta-inline {
                display: none;
            }

            .lc-article-title {
                max-width: none;
            }
        }
    </style>

    <script src="js/latest-comment.js" defer></script>

    <footer id="global-footer"></footer>

    <script src="js/diagram-book.js" defer></script>
</body>
