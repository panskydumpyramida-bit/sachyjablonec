<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blunder Grid - TJ Bižuterie Jablonec</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" crossorigin="anonymous">
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body {
            background-color: #0f172a; /* Slate 900 */
            color: #e2e8f0;
        }

        .dash-header {
            max-width: 1400px;
            margin: 1.5rem auto 1.5rem;
            background: linear-gradient(135deg, #1a1f2e, #111827);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            border-left: 4px solid #d4af37;
            border-top: 1px solid rgba(212,175,55,0.15);
            border-right: 1px solid rgba(212,175,55,0.15);
            border-bottom: 1px solid rgba(212,175,55,0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.25rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .dash-header h1 {
            font-size: 1.25rem;
            color: #d4af37;
            font-weight: 700;
            margin-bottom: 0.2rem;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .dash-header p {
            font-size: 0.8rem;
            color: #64748b;
        }

        .dash-controls {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .blunder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.25rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem 4rem;
        }

        .blunder-card {
            background: linear-gradient(135deg, rgba(30,30,40,0.95), rgba(20,20,30,0.98));
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s;
            overflow: hidden;
        }

        .blunder-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .blunder-card-header {
            padding: 0.5rem 0.6rem;
            background: rgba(0,0,0,0.25);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.4rem;
        }

        .blunder-tag {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 0.15rem 0.35rem;
            font-size: 0.65rem;
            font-weight: 700;
            border-radius: 4px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .blunder-tag.miss {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .blunder-players {
            font-weight: 600;
            font-size: 0.75rem;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            text-align: left;
        }

        .board-container {
            width: 100%;
            aspect-ratio: 1;
            background: #111;
        }

        .card-controls {
            padding: 0.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.35rem;
        }

        .eval-btn-wrapper {
            grid-column: 1 / -1;
        }

        .card-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: #cbd5e1;
            padding: 0.4rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.72rem;
            transition: all 0.15s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            width: 100%;
        }

        .card-btn:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .card-btn i { font-size: 0.8rem; }

        .card-btn.show-best {
            border-color: rgba(34, 197, 94, 0.3);
            color: #4ade80;
            background: rgba(34, 197, 94, 0.05);
        }

        .card-btn.show-best:hover {
            background: rgba(34, 197, 94, 0.15);
        }

        .card-btn.show-game {
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
            background: rgba(239, 68, 68, 0.05);
        }

        .card-btn.show-game:hover {
            background: rgba(239, 68, 68, 0.15);
        }

        .card-footer {
            padding: 0 0.6rem 0.5rem;
            font-size: 0.7rem;
            color: #64748b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-footer-eval {
            font-weight: 600;
            color: #94a3b8;
        }
        
        .card-footer a {
            color: #fbbf24;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }

        /* Chessboard custom tweaks for dark theme */
        .white-1e1d7 { background-color: #f0d9b5; }
        .black-3c85d { background-color: #b58863; }
        
        .status-banner {
            background: rgba(30,30,35,0.9);
            padding: 1rem;
            text-align: center;
            border-radius: 8px;
            margin: 0 1.5rem 2rem;
            display: none;
        }



        .filter-btn {
            background: rgba(229, 115, 115, 0.2);
            border: 1px solid rgba(229, 115, 115, 0.5);
            color: #e57373;
            padding: 0.4rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            margin-left: 1rem;
        }

        .filter-btn:hover {
            background: rgba(229, 115, 115, 0.4);
            color: #fff;
        }

        .badge-overlay {
            position: absolute;
            top: 0;
            right: 0;
            width: 25px;
            height: 25px;
            background: #d32f2f;
            color: white;
            font-weight: bold;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            transform: translate(30%, -30%);
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            font-family: sans-serif;
        }

        .autocomplete-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #2a2d33;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0 0 6px 6px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .autocomplete-item {
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #ccc;
        }

        .autocomplete-item:hover {
            background: rgba(212, 175, 55, 0.1);
            color: #fff;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 200px;
            max-width: 300px;
        }

        .search-input {
            width: 100%;
            padding: 0.5rem 2rem 0.5rem 0.8rem;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: #2a2d33;
            color: #fff;
            font-family: inherit;
        }
        
        .search-icon {
            position: absolute;
            right: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
        }

        .progress-container {
            width: 100%;
            background: rgba(255,255,255,0.1);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), #81c784);
            width: 0%;
            transition: width 0.3s ease;
        }

    </style>
</head>
<body>

    <div class="dash-header">
        <div>
            <h1><i class="fa-solid fa-chess-board" style="margin-right:0.4rem"></i> Blunder Grid</h1>
            <p>Najdi správný tah, který tys (nebo soupeř) přehlédl ve vlastní partii. <span style="opacity: 0.5;">· v5.0</span></p>
        </div>
        
        <div class="dash-controls">
            <div class="search-wrapper" style="min-width: 220px; max-width: 260px;">
                <input type="text" id="playerSearch" class="search-input" placeholder="Vyhledej hráče..." autocomplete="off">
                <i class="fa-solid fa-search search-icon"></i>
                <div id="autocompleteResults" class="autocomplete-results"></div>
            </div>

            <div class="mode-toggle" style="display: flex; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden;">
                <button id="mode-btn-training" onclick="setMode('training')" style="padding: 0.45rem 1rem; border: none; background: rgba(212,175,55,0.2); color: #d4af37; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s;"><i class="fa-solid fa-dumbbell"></i> Trénink</button>
                <button id="mode-btn-gallery" onclick="setMode('gallery')" style="padding: 0.45rem 1rem; border: none; background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s;"><i class="fa-solid fa-images"></i> Galerie</button>
            </div>
            
            <div class="threshold-slider" style="display: flex; align-items: center; gap: 0.5rem; background: rgba(0,0,0,0.2); padding: 0.4rem 0.6rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05);">
                <label for="threshold-input" style="font-size: 0.75rem; color: #aaa; font-weight: 500; white-space: nowrap;">Pokles &ge; <span id="threshold-val" style="color: #fff; font-weight: bold;">12</span>%</label>
                <input type="range" id="threshold-input" min="5" max="50" value="12" step="1" style="width: 70px; accent-color: #d4af37;">
                <button id="filter-btn" style="display: none;">Filtrovat</button>
            </div>

            <a href="members.html" style="color: #cbd5e1; text-decoration: none; font-size: 0.8rem; padding: 0.45rem 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; transition: all 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'">
                <i class="fa-solid fa-arrow-left"></i> Zpět
            </a>
        </div>
    </div>

    <div id="status-message" class="status-banner">
        <div id="status-text" style="font-weight: 500; margin-bottom: 0.5rem;">Zadejte jméno hráče pro spuštění analýzy</div>
        <div class="progress-container" id="progress-container" style="display: none;">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <!-- Section Tabs -->
    <div id="blunder-tabs" style="display: none; margin: 0 auto 1rem; max-width: 1400px; padding: 0 1.5rem;">
        <div style="display: flex; gap: 0.4rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem;">
            <button class="blunder-tab active" onclick="switchBlunderTab('grid')" id="tab-grid" style="padding: 0.4rem 1rem; background: rgba(212,175,55,0.2); border: 1px solid var(--primary-color); color: var(--primary-color); border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.15s;">
                <i class="fa-solid fa-chess-board"></i> Blunder Grid
            </button>
            <button class="blunder-tab" onclick="switchBlunderTab('games')" id="tab-games" style="padding: 0.4rem 1rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.15s;">
                <i class="fa-solid fa-list"></i> Partie <span id="games-count-badge" style="background: rgba(255,255,255,0.1); padding: 0.1rem 0.4rem; border-radius: 10px; font-size: 0.7rem; margin-left: 0.3rem;"></span>
            </button>
            <button class="blunder-tab" onclick="switchBlunderTab('featured')" id="tab-featured" style="padding: 0.4rem 1rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.15s;">
                <i class="fa-solid fa-star"></i> Oblíbené <span id="featured-count-badge" style="background: rgba(251,191,36,0.15); color: #fbbf24; padding: 0.1rem 0.4rem; border-radius: 10px; font-size: 0.7rem; margin-left: 0.3rem;"></span>
            </button>
        </div>
    </div>

    <!-- Tab: Blunder Grid -->
    <div id="blunder-grid" class="blunder-grid">
        <!-- Cards generated by JS -->
    </div>

    <!-- Tab: Games List -->
    <div id="games-panel" style="display: none; margin: 0 auto; max-width: 1400px; padding: 0 1.5rem 4rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
            <span style="color: var(--text-muted); font-size: 0.85rem;" id="games-status-text"></span>
            <button onclick="scanSelectedGames()" id="scan-selected-btn" class="card-btn" style="padding: 0.4rem 1rem; background: var(--primary-color); color: #000; font-weight: 600; font-size: 0.85rem; display: none;">
                <i class="fa-solid fa-magnifying-glass-plus"></i> Analyzovat vybrané (<span id="selected-count">0</span>)
            </button>
        </div>
        <div id="games-list" style="display: flex; flex-direction: column; gap: 0.3rem; max-height: 500px; overflow-y: auto;"></div>
    </div>

    <!-- Tab: Featured -->
    <div id="featured-panel" style="display: none; margin: 0 auto; max-width: 1400px; padding: 0 1.5rem 4rem;">
        <div style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.9rem;" id="featured-empty">
            <i class="fa-regular fa-star" style="font-size: 2rem; opacity: 0.3; display: block; margin-bottom: 0.75rem;"></i>
            Zatím žádné oblíbené. Klikni na <i class="fa-regular fa-star"></i> u blunderu v gridu.
        </div>
        <div id="featured-grid" class="blunder-grid" style="padding: 0;"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js" defer></script>
    <script src="js/blunder-grid.js?v=20260413b" defer></script>

</body>
</html>
