<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Hero v1 — Současný stav</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
    --primary-color: #d4af37;
    --secondary-color: #1a1a1a;
    --background-color: #121212;
    --text-color: #e0e0e0;
    --text-muted: #b0b0b0;
    --border-radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--background-color);
    color: var(--text-color);
    line-height: 1.6;
}

.hero {
    min-height: 600px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #0b0b0e;
}
.hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0.75));
    z-index: 1;
}
.hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
}
.hero-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    max-width: 900px;
    width: 100%;
}
.hero-content h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: #fff;
    margin-bottom: 2rem;
    line-height: 1.2;
}
.hero-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    max-width: 500px;
    margin: 0 auto;
    background: #000;
    padding: 2px;
    aspect-ratio: 1;
}
@media (min-width: 768px) {
    .hero-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
.hero-grid-item {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    text-decoration: none;
    transition: transform 0.3s;
    font-weight: 600;
    font-size: 1.1rem;
    cursor: pointer;
}
.hero-grid-item.light {
    background: #f0d9b5;
    color: #5d4037;
}
.hero-grid-item.dark {
    background: rgba(30, 30, 50, 0.85);
    color: #fff;
}
.hero-grid-item i {
    font-size: 2.5rem;
}
.hero-grid-item:hover {
    transform: scale(1.03);
}
.label {
    position: absolute;
    top: 1rem;
    left: 1rem;
    background: rgba(239, 68, 68, 0.15);
    color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.3);
    padding: 0.3rem 0.75rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    z-index: 10;
    text-transform: uppercase;
}
</style>
</head>
<body>
<div class="label">v1 — Současný stav</div>
<main>
<section class="hero">
    <picture class="hero-bg">
        <img src="https://www.sachyjablonec.cz/images/hero-desktop.webp" alt="">
    </picture>
    <div class="hero-content">
        <h1><a href="/about.html" style="text-decoration: none; color: inherit;">Šachový oddíl<br>TJ Bižuterie Jablonec</a></h1>
        <div class="hero-grid">
            <a href="#news" class="hero-grid-item light">
                <i class="fa-solid fa-newspaper" style="color: #5d4037;"></i>
                <span>Aktuality</span>
            </a>
            <a href="/calendar.html" class="hero-grid-item dark">
                <i class="fa-solid fa-chess-king" style="color: var(--primary-color);"></i>
                <span>Rozpis zápasů</span>
            </a>
            <a href="/blicak.html" class="hero-grid-item dark">
                <i class="fa-solid fa-bolt" style="color: var(--primary-color);"></i>
                <span>Blicák</span>
            </a>
            <a href="/youth.html" class="hero-grid-item light">
                <i class="fa-solid fa-child" style="color: #5d4037;"></i>
                <span>Mládež</span>
            </a>
        </div>
    </div>
</section>
</main>
</body>
</html>
