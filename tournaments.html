<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnaje a akce - Šachový oddíl TJ Bižuterie Jablonec</title>
    <meta name="description" content="Přehled šachových turnajů, tréninků a dalších akcí v okolí Jablonce nad Nisou.">

    <!-- Open Graph -->
    <meta property="og:title" content="Turnaje a akce - Šachový oddíl TJ Bižuterie Jablonec">
    <meta property="og:description"
        content="Přehled nadcházejících šachových turnajů a dalších akcí v okolí Jablonce nad Nisou.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sachyjablonec.cz/tournaments.html">
    <meta property="og:image" content="https://sachyjablonec.cz/assets/og-tournaments.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Turnaje a akce - Šachový oddíl TJ Bižuterie Jablonec">
    <meta name="twitter:description" content="Přehled nadcházejících šachových turnajů a dalších akcí v okolí.">

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=20251226">
    <link rel="stylesheet" href="css/tournaments.css?v=20260213">
</head>

<body>
    <header id="global-header"></header>

    <main class="page-wrapper">
        <section class="content-section tournaments-section">
            <!-- Hero -->
            <div class="hero-compact">
                <h1>
                    <i class="fa-solid fa-trophy" style="color: #22d3ee;"></i>
                    Turnaje a akce
                </h1>
                <p class="subtitle">
                    Přehled nadcházejících šachových turnajů a dalších akcí v okolí.
                </p>

                <a href="/individual-competitions" class="btn-primary btn-individual-comp">
                    <i class="fa-solid fa-chess"></i> Soutěže jednotlivců
                </a>
            </div>

            <!-- Filter Bar -->
            <div class="events-filter-bar">
                <div class="filter-row">

                    <!-- Age Group Pills -->
                    <div class="filter-pill-group">
                        <span class="filter-label">Věk:</span>
                        <div id="age-filters" class="filter-pill-track">
                            <button class="filter-pill active" data-filter="all" onclick="filterByAge('all')">
                                Vše
                            </button>
                            <button class="filter-pill" data-filter="youth" onclick="filterByAge('youth')">
                                <i class="fa-solid fa-child"></i>Mládež
                            </button>
                            <button class="filter-pill" data-filter="adults" onclick="filterByAge('adults')">
                                <i class="fa-solid fa-chess-knight"></i>Dospělí
                            </button>
                        </div>
                    </div>

                    <!-- Tempo Pills -->
                    <div class="filter-pill-group">
                        <span class="filter-label">Tempo:</span>
                        <div id="tempo-filters" class="filter-pill-track">
                            <button class="filter-pill active" data-filter="all" onclick="filterByTempo('all')">
                                Vše
                            </button>
                            <button class="filter-pill" data-filter="blitz" onclick="filterByTempo('blitz')"
                                title="Bleskový šach">
                                <i class="fa-solid fa-bolt"></i>Blesk
                            </button>
                            <button class="filter-pill" data-filter="rapid" onclick="filterByTempo('rapid')"
                                title="Rapid šach">
                                <i class="fa-solid fa-stopwatch"></i>Rapid
                            </button>
                            <button class="filter-pill" data-filter="classical" onclick="filterByTempo('classical')"
                                title="Vážná partie">
                                <i class="fa-solid fa-chess-king"></i>Vážná
                            </button>
                        </div>
                    </div>

                    <!-- Past Events Toggle -->
                    <label class="toggle-past-label" title="Zobrazit/skrýt proběhlé turnaje">
                        <span class="toggle-past-text">Historie</span>
                        <div class="toggle-switch">
                            <input type="checkbox" id="show-past" onchange="togglePastEvents()">
                            <div id="toggleTrack" class="toggle-track"></div>
                            <div id="toggleThumb" class="toggle-thumb"></div>
                        </div>
                        <i id="toggleIcon" class="fa-solid fa-eye-slash toggle-icon"></i>
                    </label>
                </div>
            </div>

            <!-- Events Container -->
            <div id="events-container">
                <div class="events-loading">
                    <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                    <p style="margin-top: 1rem;">Načítám události...</p>
                </div>
            </div>
        </section>
    </main>

    <footer id="global-footer"></footer>

    <script src="js/config.js?v=4" defer></script>
    <script src="js/layout-loader.js?v=5" defer></script>
    <script src="js/main.js?v=20251226" defer></script>
    <script src="js/tournaments.js?v=20260213" defer></script>
</body>

</html>
